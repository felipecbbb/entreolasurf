<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin — Entre Olas Surf</title>

  <!-- Fonts (same as main site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>

  <!-- ==================== LOGIN VIEW ==================== -->
  <div id="login-view" class="admin-login">
    <div class="admin-login-card">
      <h1>Entre Olas</h1>
      <p>Panel de Administración</p>

      <div id="login-error" class="admin-login-error"></div>

      <form id="login-form" class="trip-form">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="admin@entreolasurf.com" required />

        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" required />

        <button type="submit" class="btn red" style="margin-top:12px;width:100%">Iniciar Sesión</button>
      </form>
    </div>
  </div>

  <!-- ==================== ADMIN APP ==================== -->
  <div id="admin-app" class="admin-layout" style="display:none">

    <!-- Overlay for mobile sidebar -->
    <div id="admin-overlay" class="admin-overlay"></div>

    <!-- Sidebar -->
    <aside id="admin-sidebar" class="admin-sidebar">
      <div class="admin-sidebar-logo">
        <div class="admin-sidebar-logo-mark">EO</div>
        <div>
          <h2>Entre Olas</h2>
          <small>Admin Panel</small>
        </div>
      </div>

      <nav class="admin-nav">
        <div class="admin-nav-group">
          <span class="admin-nav-group-label">General</span>
          <a href="#dashboard" data-section="dashboard" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
            Dashboard
          </a>
          <a href="#estadisticas" data-section="estadisticas" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
            Estadísticas
          </a>
        </div>

        <div class="admin-nav-group">
          <span class="admin-nav-group-label">Surf Camps</span>
          <a href="#camps" data-section="camps" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>
            Surf Camps
          </a>
          <a href="#reservas" data-section="reservas" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
            Reservas
          </a>
        </div>

        <div class="admin-nav-group">
          <span class="admin-nav-group-label">Clases</span>
          <a href="#calendario" data-section="calendario" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
            Calendario
          </a>
          <a href="#actividades" data-section="actividades" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
            Actividades
          </a>
          <a href="#reserva-clases" data-section="reserva-clases" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
            Reserva Clases
          </a>
        </div>

        <div class="admin-nav-group">
          <span class="admin-nav-group-label">Tienda</span>
          <a href="#productos" data-section="productos" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></span>
            Productos
          </a>
          <a href="#pedidos" data-section="pedidos" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
            Pedidos
          </a>
        </div>

        <div class="admin-nav-group">
          <span class="admin-nav-group-label">Otros</span>
          <a href="#clientes" data-section="clientes" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4-4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            Clientes
          </a>
          <a href="#material" data-section="material" class="admin-nav-item">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
            Material
          </a>
          <a href="/" target="_blank" class="admin-nav-item admin-nav-item-external">
            <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span>
            Ver web
          </a>
        </div>
      </nav>

      <div class="admin-sidebar-footer">
        <button id="logout-btn" class="admin-logout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar Sesión
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="admin-main">
      <header class="admin-topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button id="hamburger-btn" class="admin-hamburger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 id="section-title" class="admin-section-title">Dashboard</h1>
        </div>
        <span id="user-display" class="admin-user-info"></span>
      </header>

      <main id="admin-content" class="admin-content">
        <!-- Sections render here -->
      </main>
    </div>
  </div>

  <!-- Shared modal -->
  <div id="admin-modal" class="admin-modal">
    <div class="admin-modal-dialog">
      <div class="admin-modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close" class="admin-modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="admin-toast-container"></div>

  <script type="module" src="/admin/admin.js"></script>
</body>
</html>
